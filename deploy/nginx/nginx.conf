events {}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	sendfile on;
	server_tokens off;

	server {
		listen 80;
		server_name beautytrust.ru www.beautytrust.ru apis.beautytrust.ru;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl http2;
		server_name beautytrust.ru www.beautytrust.ru;

		ssl_certificate /etc/letsencrypt/live/beautytrust.ru/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/beautytrust.ru/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /var/www/landing;
		index index.html;

		location / {
			try_files $uri $uri/ /index.html;
		}
	}

	server {
		listen 443 ssl http2;
		server_name apis.beautytrust.ru;

		ssl_certificate /etc/letsencrypt/live/beautytrust.ru/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/beautytrust.ru/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;
		client_max_body_size 20m;

		location / {
			proxy_pass http://api:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}
}
