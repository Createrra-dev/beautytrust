services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: beautytrust
      POSTGRES_USER: beautytrust
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautytrust_prod_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beautytrust -d beautytrust"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://beautytrust:${POSTGRES_PASSWORD:-beautytrust_prod_change_me}@127.0.0.1:5432/beautytrust
      REDIS_URL: redis://127.0.0.1:6379/0
      PUBLIC_BASE_URL: https://apis.beautytrust.ru
      UPLOADS_DIR: /app/data/uploads
      FORCE_HTTPS: "true"
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - api_data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.active.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../landing:/var/www/landing:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh

volumes:
  postgres_data:
  api_data:
  redis_data:
  certbot_www:
  certbot_conf:
